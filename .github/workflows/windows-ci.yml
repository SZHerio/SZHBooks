name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Enable MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          arch: win64_msvc2022_64
          modules: qtpdf
          tools: tools_ifw
          cache: true

      - name: Locate Qt Installer Framework
        shell: pwsh
        run: |
          $binaryCreator = (Get-Command binarycreator.exe -ErrorAction Stop).Source
          $ifwRoot = Split-Path (Split-Path $binaryCreator -Parent) -Parent
          "SZHBOOKS_IFW_ROOT=$ifwRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure
        shell: pwsh
        run: >-
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON
          -DCPACK_IFW_ROOT="$env:SZHBOOKS_IFW_ROOT"

      - name: Build
        run: cmake --build build/ci --parallel

      - name: Validate QML
        run: cmake --build build/ci --target appSZHBooks_qmllint

      - name: Run tests
        run: ctest --test-dir build/ci -C Release --output-on-failure

      - name: Verify clean install tree
        shell: pwsh
        run: |
          cmake --install build/ci --prefix "$pwd/build/ci-install" --config Release
          cmake -DSZHBOOKS_INSTALL_ROOT="$pwd/build/ci-install" -DSZHBOOKS_EXPECTED_VERSION:STRING=1.0.0 -P cmake/verify_install.cmake

      - name: Build installer
        working-directory: build/ci
        shell: pwsh
        run: cpack -G IFW -C Release

      - name: Configure portable build
        shell: pwsh
        run: >-
          cmake -S . -B build/portable -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -DSZHBOOKS_PORTABLE_BUILD=ON

      - name: Build portable application
        run: cmake --build build/portable --parallel

      - name: Verify portable install tree
        shell: pwsh
        run: |
          cmake --install build/portable --prefix "$pwd/build/portable-install" --config Release
          cmake -DSZHBOOKS_INSTALL_ROOT="$pwd/build/portable-install" -DSZHBOOKS_EXPECTED_VERSION:STRING=1.0.0 -DSZHBOOKS_EXPECT_PORTABLE:BOOL=ON -P cmake/verify_install.cmake

      - name: Build portable ZIP
        working-directory: build/portable
        shell: pwsh
        run: cpack -G ZIP -C Release

      - name: Verify packages
        shell: pwsh
        run: |
          $packages = @(
            Get-Item build/ci/SZHBooks-1.0.0-win64.exe
            Get-Item build/ci/SZHBooks-1.0.0-win64.exe.sha256
            Get-Item build/portable/SZHBooks-1.0.0-portable-win64.zip
            Get-Item build/portable/SZHBooks-1.0.0-portable-win64.zip.sha256
          )
          $payloads = $packages | Where-Object { $_.Extension -in '.exe', '.zip' }
          if (($payloads | Where-Object Length -lt 1000).Count -gt 0) { throw 'A release artifact is unexpectedly small.' }
          $packages | Format-Table Name, Length

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: SZHBooks-windows-${{ github.sha }}
          path: |
            build/ci/*.exe
            build/ci/*.sha256
            build/portable/*.zip
            build/portable/*.sha256
          if-no-files-found: error
          retention-days: 14
